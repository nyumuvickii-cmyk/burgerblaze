services:
  - type: web
    name: burgerblaze
    env: python
    plan: free
    pythonVersion: 3.11
    startCommand: gunicorn burgerblaze.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: burgerblaze-db
          property: connectionString

databases:
  - name: burgerblaze-db
    engine: postgresql
    version: "15"
    plan: free
